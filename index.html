<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Anu ❤️ Varun | Distance Check-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQneASqq2F+a+xxCCIG4I3T1N5xZ2r4=" crossorigin="" />
  <link rel="stylesheet" href="styles.css?v=20260722-github-checkins" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">A tiny love map for</p>
      <h1>Anu <span>❤️</span> Varun</h1>
      <p class="tagline">Distance is just a number <3</p>
    </section>

    <section class="checkin-card" aria-labelledby="checkin-title">
      <h2 id="checkin-title">Who is checking in?</h2>
      <div class="people-grid">
        <button class="person-button" data-person="anu" type="button">
          <img src="assets/images/anu/profile.jpeg" alt="Anu" />
          <span>Check in as Anu</span>
        </button>
        <button class="person-button" data-person="varun" type="button">
          <img src="assets/images/varun/profilev.jpeg" alt="Varun" />
          <span>Check in as Varun</span>
        </button>
      </div>
      <p id="status" class="status" role="status">Tap your picture to share your latest location.</p>
    </section>

    <section class="map-card" aria-labelledby="map-title">
      <div class="map-header">
        <div>
          <p class="eyebrow">Latest love line</p>
          <h2 id="map-title">Distance between you two</h2>
        </div>
        <div id="distance" class="distance">Waiting for both check-ins</div>
      </div>
      <div id="map" aria-label="Map showing Anu and Varun's latest check-ins"></div>
      <p id="love-note" class="love-note">No matter the miles, every check-in says “I am right here with you.”</p>
      <div id="last-updated" class="last-updated"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js?v=20260722-github-checkins"></script>
</body>
</html>
